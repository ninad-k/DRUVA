// DHRUVA shared message types.
syntax = "proto3";

package dhruva.v1;

import "google/protobuf/timestamp.proto";

// Monetary amount carried as a decimal string (e.g. "1234.56") to avoid
// floating-point drift. Services parse/format using Python Decimal / JS Decimal.
message Money {
  string amount = 1;
  string currency = 2; // "INR"
}

enum Side {
  SIDE_UNSPECIFIED = 0;
  BUY = 1;
  SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  MARKET = 1;
  LIMIT = 2;
  SL = 3;
  SL_M = 4;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  OPEN = 2;
  FILLED = 3;
  PARTIAL = 4;
  REJECTED = 5;
  CANCELLED = 6;
}

enum Exchange {
  EXCHANGE_UNSPECIFIED = 0;
  NSE = 1;
  BSE = 2;
  NFO = 3;
  BFO = 4;
  MCX = 5;
}

// Pagination helper.
message Page {
  int32 offset = 1;
  int32 limit = 2;
}

message PageInfo {
  int32 total = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message AuditMeta {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp updated_at = 2;
}
