global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dhruva-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: envoy
    metrics_path: /stats/prometheus
    static_configs:
      - targets: ["envoy:9901"]
