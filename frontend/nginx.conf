# SPA serving with API + gRPC-Web + WebSocket upstreams
server {
  listen 80;
  server_name _;

  root   /usr/share/nginx/html;
  index  index.html;

  # Cache static assets aggressively
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Upstream REST API (backend container on internal network)
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket hub
  location /ws {
    proxy_pass http://backend:8001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # gRPC-Web via Envoy sidecar
  location /grpc/ {
    proxy_pass http://envoy:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Content-Type $content_type;
  }

  # Basic security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
